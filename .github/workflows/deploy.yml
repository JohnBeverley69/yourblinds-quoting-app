name: Deploy to Cloudways

# Zero-click deploy: every push to main (i.e. every merged PR) tells
# Cloudways to pull the latest code into the live site. Replaces the
# manual "Start Deployment" click in the Cloudways panel.
#
# Credentials live in GitHub repo Secrets (Settings -> Secrets and
# variables -> Actions), never in this file:
#   CLOUDWAYS_EMAIL      - the email you log into Cloudways with
#   CLOUDWAYS_API_KEY    - Cloudways -> Account -> API Keys
#   CLOUDWAYS_SERVER_ID  - numeric id from the Cloudways app URL
#   CLOUDWAYS_APP_ID     - numeric id from the Cloudways app URL

on:
  push:
    branches: [main]
  workflow_dispatch:   # also allow a manual run from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Backstop so a hung API call can never sit there burning minutes — the
    # individual curls have their own timeouts well under this.
    timeout-minutes: 5
    steps:
      - name: Trigger Cloudways git pull
        env:
          CW_EMAIL:     ${{ secrets.CLOUDWAYS_EMAIL }}
          CW_API_KEY:   ${{ secrets.CLOUDWAYS_API_KEY }}
          CW_SERVER_ID: ${{ secrets.CLOUDWAYS_SERVER_ID }}
          CW_APP_ID:    ${{ secrets.CLOUDWAYS_APP_ID }}
        run: |
          set -euo pipefail

          # Fail early with a clear message if a secret is missing.
          for v in CW_EMAIL CW_API_KEY CW_SERVER_ID CW_APP_ID; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Missing GitHub secret for $v. Add it under Settings -> Secrets and variables -> Actions."
              exit 1
            fi
          done

          # The Cloudways auth endpoint occasionally blips / hangs. Try a few
          # times with a hard per-attempt timeout so a transient failure
          # auto-recovers instead of going red and needing a manual re-run.
          echo "Requesting Cloudways access token..."
          TOKEN=""
          AUTH_RESP=""
          for attempt in 1 2 3; do
            AUTH_RESP=$(curl -sS --connect-timeout 15 --max-time 30 \
              -X POST https://api.cloudways.com/api/v1/oauth/access_token \
              -d "email=${CW_EMAIL}" \
              -d "api_key=${CW_API_KEY}" || true)
            TOKEN=$(printf '%s' "$AUTH_RESP" | jq -r '.access_token // empty' 2>/dev/null || true)
            if [ -n "$TOKEN" ]; then
              echo "Got access token on attempt $attempt."
              break
            fi
            echo "Auth attempt $attempt got no token. Response: ${AUTH_RESP:-<empty/timeout>}"
            [ "$attempt" -lt 3 ] && sleep 5 || true
          done

          if [ -z "$TOKEN" ]; then
            # Safe to print the response here — auth failed, so there's no token
            # to leak (and the api_key is never echoed back by the endpoint).
            echo "::error::Could not get a Cloudways access token after 3 tries. If CLOUDWAYS_EMAIL / CLOUDWAYS_API_KEY are correct this is usually a transient Cloudways API blip — Re-run the job. Last response: ${AUTH_RESP:-<empty/timeout>}"
            exit 1
          fi

          # Same treatment for the git-pull trigger.
          echo "Triggering git pull of 'main' into the live app..."
          HTTP="000"
          for attempt in 1 2 3; do
            HTTP=$(curl -sS --connect-timeout 15 --max-time 60 -o /tmp/cw_resp.json -w '%{http_code}' \
              -X POST https://api.cloudways.com/api/v1/git/pull \
              -H "Authorization: Bearer ${TOKEN}" \
              -d "server_id=${CW_SERVER_ID}" \
              -d "app_id=${CW_APP_ID}" \
              -d "branch_name=main" \
              -d "deploy_path=" || echo "000")
            if [ "${HTTP:-000}" -ge 200 ] && [ "${HTTP:-000}" -lt 300 ]; then
              break
            fi
            echo "git/pull attempt $attempt returned HTTP ${HTTP:-000}:"
            cat /tmp/cw_resp.json 2>/dev/null || true
            echo ""
            [ "$attempt" -lt 3 ] && sleep 5 || true
          done

          echo "Cloudways HTTP status: $HTTP"
          echo "Cloudways response:"
          cat /tmp/cw_resp.json 2>/dev/null || true
          echo ""

          if [ "${HTTP:-000}" -ge 200 ] && [ "${HTTP:-000}" -lt 300 ]; then
            echo "Deploy triggered successfully. Confirm in Cloudways -> Deployment Via Git -> logs."
          else
            echo "::error::Cloudways returned HTTP $HTTP after 3 tries — deploy not triggered. See response above."
            exit 1
          fi
